services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    working_dir: /var/www/html

    volumes:
      - ./:/var/www/html

    depends_on:
      - mysql
      - redis

    environment:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: marketing_demo
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis

  mysql:
    image: mysql:8

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marketing_demo

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine