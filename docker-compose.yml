services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: marketing_app

    working_dir: /var/www/html

    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini

    depends_on:
      - mysql

  nginx:
    image: nginx:latest

    container_name: marketing_nginx

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:
    image: mysql:8

    container_name: marketing_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marketing_demo

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin

    container_name: marketing_phpmyadmin

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

    depends_on:
      - mysql

volumes:
  mysql_data: